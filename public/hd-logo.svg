<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Outer circle -->
  <circle cx="250" cy="250" r="230" fill="#0EA5E9" stroke="#0F172A" stroke-width="20"/>

  <!-- Network background -->
  <g stroke="#ffffff" stroke-width="2" opacity="0.8">
    <line x1="100" y1="150" x2="200" y2="80"/>
    <line x1="200" y1="80" x2="320" y2="100"/>
    <line x1="320" y1="100" x2="400" y2="180"/>
    <line x1="400" y1="180" x2="350" y2="300"/>
    <line x1="350" y1="300" x2="420" y2="380"/>
    <line x1="100" y1="150" x2="80" y2="280"/>
    <line x1="80" y1="280" x2="150" y2="380"/>
    <line x1="150" y1="380" x2="280" y2="420"/>
    <line x1="280" y1="420" x2="350" y2="300"/>
    <line x1="150" y1="380" x2="250" y2="320"/>
    <line x1="250" y1="320" x2="200" y2="80"/>
  </g>

  <!-- Nodes -->
  <g fill="#0EA5E9" stroke="#ffffff" stroke-width="3">
    <circle cx="100" cy="150" r="15"/>
    <circle cx="200" cy="80" r="15"/>
    <circle cx="320" cy="100" r="15"/>
    <circle cx="400" cy="180" r="15"/>
    <circle cx="350" cy="300" r="15"/>
    <circle cx="420" cy="380" r="15"/>
    <circle cx="80" cy="280" r="15"/>
    <circle cx="150" cy="380" r="15"/>
    <circle cx="280" cy="420" r="15"/>
    <circle cx="250" cy="320" r="15"/>
  </g>

  <!-- Node inner persons (simplified) -->
  <g fill="#ffffff">
    <circle cx="100" cy="146" r="4"/>
    <path d="M 94 158 a 6 6 0 0 1 12 0" />
    <circle cx="200" cy="76" r="4"/>
    <path d="M 194 88 a 6 6 0 0 1 12 0" />
    <circle cx="320" cy="96" r="4"/>
    <path d="M 314 108 a 6 6 0 0 1 12 0" />
    <circle cx="400" cy="176" r="4"/>
    <path d="M 394 188 a 6 6 0 0 1 12 0" />
    <circle cx="350" cy="296" r="4"/>
    <path d="M 344 308 a 6 6 0 0 1 12 0" />
    <circle cx="420" cy="376" r="4"/>
    <path d="M 414 388 a 6 6 0 0 1 12 0" />
    <circle cx="80" cy="276" r="4"/>
    <path d="M 74 288 a 6 6 0 0 1 12 0" />
    <circle cx="150" cy="376" r="4"/>
    <path d="M 144 388 a 6 6 0 0 1 12 0" />
    <circle cx="280" cy="416" r="4"/>
    <path d="M 274 428 a 6 6 0 0 1 12 0" />
    <circle cx="250" cy="316" r="4"/>
    <path d="M 244 328 a 6 6 0 0 1 12 0" />
  </g>

  <!-- Glossy blue speech bubble -->
  <rect x="140" y="200" width="220" height="150" rx="20" fill="url(#gradBubble)" stroke="#e2e8f0" stroke-width="2"/>
  <polygon points="180,350 160,400 210,350" fill="#2563EB" />
  
  <defs>
    <linearGradient id="gradBubble" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradBot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#94a3b8;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Speech bubble text -->
  <text x="250" y="280" font-family="Arial, sans-serif" font-weight="bold" font-size="80" fill="#ffffff" text-anchor="middle" letter-spacing="4">HD</text>
  <text x="250" y="315" font-family="Arial, sans-serif" font-weight="bold" font-size="16" fill="#e0f2fe" text-anchor="middle" letter-spacing="2">HEAVENLY DREAMS</text>
  <text x="250" y="335" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#bae6fd" text-anchor="middle" letter-spacing="1">SAS DE CV</text>

  <!-- Robot head -->
  <!-- Antenna -->
  <line x1="250" y1="120" x2="250" y2="90" stroke="#94a3b8" stroke-width="6"/>
  <circle cx="250" cy="90" r="8" fill="#3B82F6"/>
  <!-- Ears -->
  <rect x="175" y="150" width="15" height="30" rx="5" fill="#64748b" />
  <rect x="310" y="150" width="15" height="30" rx="5" fill="#64748b" />
  <!-- Main face -->
  <rect x="185" y="120" width="130" height="80" rx="15" fill="url(#gradBot)" stroke="#334155" stroke-width="3"/>
  <rect x="195" y="130" width="110" height="50" rx="10" fill="#0f172a" />
  <!-- Eyes -->
  <path d="M 210 155 Q 225 140 240 155" fill="none" stroke="#38bdf8" stroke-width="6" stroke-linecap="round"/>
  <path d="M 260 155 Q 275 140 290 155" fill="none" stroke="#38bdf8" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Little connection to bubble -->
  <rect x="235" y="200" width="30" height="15" fill="#94a3b8" />
</svg>
